name: Release binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Vue SPA
        run: |
          cd web && npm ci && npm run build

      - name: Embed SPA and build Go binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p internal/server/static
          cp -r web/dist/* internal/server/static/
          go build -o mailgun-mock-api${{ matrix.ext }} ./cmd/server

      - name: Package archive
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          ARCHIVE="mailgun-mock-api-${TAG}-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir "$ARCHIVE"
          cp mailgun-mock-api${{ matrix.ext }} "$ARCHIVE/"
          cp README.md "$ARCHIVE/"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${ARCHIVE}.zip" -r "$ARCHIVE"
            echo "ASSET=${ARCHIVE}.zip" >> "$GITHUB_ENV"
          else
            tar czf "${ARCHIVE}.tar.gz" "$ARCHIVE"
            echo "ASSET=${ARCHIVE}.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload release asset
        run: gh release upload "${GITHUB_REF#refs/tags/}" "${{ env.ASSET }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
